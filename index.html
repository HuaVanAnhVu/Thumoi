<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thư Mời Lễ Tốt Nghiệp</title>
    <!-- Google Fonts for retro elegance and cursive handwriting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Great+Vibes&family=Caveat:wght@400..700&family=Playpen+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <style>
        /* CSS resets & variable styling */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --wood-dark: #1f110a;
            --wood-light: #3b2216;
            --cardboard-base: #cf9c63;
            --cardboard-dark: #b88349;
            --cardboard-light: #e5b885;
            --gold: #d4af37;
            --gold-dark: #aa8612;
            --ink: #2a2221;
            --crimson: #800020;
            --accent: #5d4037;
            --ambient-lamp: rgba(255, 235, 180, 0.12);
        }

        body {
            font-family: 'Playfair Display', Georgia, serif;
            background-color: var(--wood-dark);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1500px;
        }

        /* 3D Wooden Desk Background Container */
        .desk-container {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background:
                radial-gradient(circle at 75% 20%, var(--ambient-lamp), transparent 60%),
                radial-gradient(circle at center, transparent 30%, rgba(0, 0, 0, 0.85) 100%),
                linear-gradient(90deg, #2a180e 0%, #3e2618 25%, #2a180e 50%, #442a1b 75%, #2a180e 100%);
            background-size: cover;
            overflow: hidden;
        }

        /* Wooden planks simulation */
        .desk-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                repeating-linear-gradient(90deg, rgba(0, 0, 0, 0.15) 0px, rgba(0, 0, 0, 0.15) 1px, transparent 1px, transparent 150px),
                repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.02) 0px, rgba(255, 255, 255, 0.02) 2px, transparent 2px, transparent 6px);
            pointer-events: none;
            opacity: 0.8;
        }

        /* Vignette glow */
        .vignette {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, transparent 40%, rgba(0, 0, 0, 0.7) 100%);
            pointer-events: none;
            z-index: 2;
        }

        /* Desk decorations styling */
        .decor {
            position: absolute;
            pointer-events: none;
            filter: drop-shadow(4px 8px 12px rgba(0, 0, 0, 0.6));
            z-index: 1;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 1;
        }

        /* Dim and blur background decorations when envelope is opened */
        .is-open~.decor {
            opacity: 0.15;
            filter: drop-shadow(2px 4px 6px rgba(0, 0, 0, 0.4)) blur(2.5px);
        }

        /* Graduation Cap SVG Decoration */
        .decor-cap {
            left: 5%;
            bottom: 8%;
            width: 280px;
            transform: rotate(-15deg);
        }

        /* Diploma Scroll SVG Decoration */
        .decor-scroll {
            right: 6%;
            bottom: 12%;
            width: 200px;
            transform: rotate(20deg);
        }

        /* Candle with glowing flame */
        .decor-candle {
            left: 8%;
            top: 8%;
            width: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .candle-body {
            width: 40px;
            height: 100px;
            background: linear-gradient(to right, #ffecd2, #fcb69f);
            border-radius: 4px;
            box-shadow: inset -6px 0 10px rgba(0, 0, 0, 0.15), 0 5px 15px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        .candle-wick {
            width: 3px;
            height: 12px;
            background: #2b1f1d;
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
        }

        .candle-flame {
            width: 16px;
            height: 28px;
            background: radial-gradient(circle at bottom, #ff9800 20%, #ff5722, transparent 80%);
            border-radius: 50% 50% 20% 20% / 60% 60% 40% 40%;
            position: absolute;
            top: -38px;
            left: 50%;
            transform: translateX(-50%);
            animation: flicker 1.5s infinite alternate ease-in-out;
            filter: blur(1px);
            box-shadow: 0 0 20px #ff9800, 0 0 40px #ff5722;
        }

        .candle-stand {
            width: 70px;
            height: 10px;
            background: #111;
            border-radius: 5px;
            margin-top: -2px;
        }

        @keyframes flicker {
            0% {
                transform: translateX(-50%) scale(0.95) rotate(-1deg);
                opacity: 0.9;
            }

            50% {
                transform: translateX(-50%) scale(1.05) rotate(1deg);
                opacity: 1;
            }

            100% {
                transform: translateX(-50%) scale(0.98) rotate(-0.5deg);
                opacity: 0.95;
            }
        }

        /* Cherry blossoms / petals scattered */
        .petal {
            position: absolute;
            background: linear-gradient(135deg, #ffb7c5, #ffa0b4);
            border-radius: 150% 0 150% 150% / 150% 0 150% 150%;
            pointer-events: none;
            z-index: 2;
            filter: drop-shadow(1px 2px 3px rgba(0, 0, 0, 0.25));
        }

        .p1 {
            width: 18px;
            height: 14px;
            top: 12%;
            right: 25%;
            transform: rotate(45deg);
        }

        .p2 {
            width: 14px;
            height: 11px;
            bottom: 25%;
            left: 35%;
            transform: rotate(-30deg);
        }

        .p3 {
            width: 22px;
            height: 16px;
            bottom: 15%;
            right: 30%;
            transform: rotate(110deg);
        }

        .p4 {
            width: 16px;
            height: 13px;
            top: 75%;
            left: 10%;
            transform: rotate(-75deg);
        }

        .p5 {
            width: 15px;
            height: 12px;
            top: 40%;
            right: 8%;
            transform: rotate(85deg);
        }

        /* Vintage Vinyl Player Music Button */
        .music-player-btn {
            position: absolute;
            top: 25px;
            right: 25px;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: #111;
            border: 3px solid var(--gold);
            cursor: pointer;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .music-player-btn:hover {
            transform: scale(1.1);
        }

        .vinyl-record {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, #f9d976 0%, #e9b646 15%, #111 16%, #111 30%, #222 31%, #111 45%, #222 46%, #111 60%, #333 61%, #111 75%);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .vinyl-center {
            width: 14px;
            height: 14px;
            background: var(--gold);
            border-radius: 50%;
            border: 2px solid #111;
        }

        .music-player-btn.playing .vinyl-record {
            animation: spin-vinyl 3s linear infinite;
        }

        @keyframes spin-vinyl {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        /* 3D Envelope Wrapper */
        .envelope-container {
            position: relative;
            width: 480px;
            height: 330px;
            z-index: 5;
            transform-style: preserve-3d;
            transition: transform 1s cubic-bezier(0.4, 0.0, 0.2, 1);
        }

        /* Glass table mat below envelope */
        .envelope-shadow {
            position: absolute;
            width: 110%;
            height: 40px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 50%;
            bottom: -35px;
            left: -5%;
            filter: blur(12px);
            z-index: 0;
            pointer-events: none;
            transition: all 1s ease;
        }

        /* Envelope general styles */
        .envelope {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: var(--cardboard-dark);
            border-radius: 6px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transform-style: preserve-3d;
            z-index: 5;
            transition: all 0.8s ease-in-out;
        }

        /* Cardboard texture simulation */
        .texture-overlay {
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 3px 3px;
            mix-blend-mode: overlay;
            opacity: 0.6;
            pointer-events: none;
        }

        /* Vintage dashed borders (vintage cardboard look) */
        .envelope-dashed-border {
            position: absolute;
            inset: 10px;
            border: 2px dashed #4e2e1a;
            border-radius: 4px;
            pointer-events: none;
            opacity: 0.7;
        }

        /* Flaps layout. 
           Optimized transitions: when opening, flips immediately; 
           when closing, waits for the letter to slide back inside first. */
        .flap-top {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: var(--cardboard-dark);
            clip-path: polygon(0 0, 100% 0, 50% 100%);
            transform-origin: top;
            /* When closing: wait 0.6s for the letter to slide in, then flip down in 0.5s */
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1) 0.6s, z-index 0.01s linear 0.6s;
            z-index: 8;
        }

        .is-open .flap-top {
            transform: rotateX(180deg);
            /* When opening: flip open immediately in 0.5s, no delay */
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1), z-index 0.01s linear 0.25s;
            z-index: 3;
        }

        .flap-left {
            position: absolute;
            top: 0;
            left: 0;
            width: 50%;
            height: 100%;
            background: #b07e44;
            clip-path: polygon(0 0, 100% 50%, 0 100%);
            z-index: 7;
        }

        .flap-right {
            position: absolute;
            top: 0;
            right: 0;
            width: 50%;
            height: 100%;
            background: #aa773e;
            clip-path: polygon(100% 0, 100% 100%, 0 50%);
            z-index: 7;
        }

        .flap-bottom {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60%;
            background: var(--cardboard-base);
            clip-path: polygon(0 100%, 100% 100%, 50% 0);
            z-index: 7;
        }

        /* Envelope Front Address details */
        .envelope-front-content {
            position: absolute;
            inset: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            z-index: 6;
            color: #4e2e1a;
            text-shadow: 1px 1px 0px rgba(255, 255, 255, 0.15);
            pointer-events: none;
        }

        .vintage-stamp {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 65px;
            height: 80px;
            background: #fdf5e6;
            border: 2px dashed #b5834e;
            box-shadow: 1px 2px 4px rgba(0, 0, 0, 0.2);
            padding: 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            transform: rotate(3deg);
        }

        .vintage-stamp svg {
            width: 32px;
            height: 32px;
            fill: var(--crimson);
        }

        .vintage-stamp span {
            font-size: 8px;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
            color: #5d4037;
        }

        .stamp-postmark {
            position: absolute;
            top: 5px;
            right: -10px;
            width: 90px;
            height: 90px;
            border: 1px solid rgba(78, 46, 26, 0.4);
            border-radius: 50%;
            transform: rotate(-10deg);
        }

        .stamp-postmark::before {
            content: 'GRADUATION 2026';
            position: absolute;
            font-size: 6px;
            color: rgba(78, 46, 26, 0.4);
            top: 25px;
            left: 8px;
            transform: rotate(-25deg);
            letter-spacing: 0.5px;
        }

        .envelope-label {
            margin-top: 100px;
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-bottom: 2px solid #4e2e1a;
            padding-bottom: 5px;
            width: 80%;
            text-align: center;
        }

        .envelope-sublabel {
            font-family: 'Caveat', cursive;
            font-size: 18px;
            margin-top: 10px;
            color: #6d4c41;
        }

        /* Wax Seal Button (Triggers Open) */
        .wax-seal {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 70px;
            height: 70px;
            background: var(--crimson);
            border-radius: 50%;
            transform: translate(-50%, -20%) scale(1);
            z-index: 10;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5), inset 0 2px 4px rgba(255, 255, 255, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.4s ease;
        }

        .wax-seal:hover {
            transform: translate(-50%, -20%) scale(1.15);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.6), 0 0 10px var(--gold-dark);
        }

        .wax-seal::after {
            content: '';
            position: absolute;
            inset: 4px;
            border-radius: 50%;
            border: 2px dashed rgba(255, 255, 255, 0.3);
        }

        .wax-seal svg {
            width: 32px;
            height: 32px;
            fill: #fff;
            filter: drop-shadow(0px 2px 2px rgba(0, 0, 0, 0.4));
        }

        /* Ripple effect on seal */
        .wax-seal-pulse {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 76px;
            height: 76px;
            border: 2px solid var(--crimson);
            border-radius: 50%;
            transform: translate(-50%, -20%) scale(1);
            animation: pulse-ring 2s infinite;
            z-index: 9;
            pointer-events: none;
            opacity: 0;
        }

        @keyframes pulse-ring {
            0% {
                transform: translate(-50%, -20%) scale(0.95);
                opacity: 0.8;
            }

            100% {
                transform: translate(-50%, -20%) scale(1.3);
                opacity: 0;
            }
        }

        /* Letter Inside (Slides out & zooms) */
        .letter {
            position: absolute;
            width: 94%;
            height: 94%;
            top: 3%;
            left: 3%;
            background-color: #dfb282;
            /* Kraft paper color */
            border-radius: 4px;
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.2), 0 2px 5px rgba(0, 0, 0, 0.15);
            z-index: 2;
            transform-origin: center center;
            overflow-x: hidden;
            overflow-y: auto;
            transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1),
                left 0.8s cubic-bezier(0.34, 1.56, 0.64, 1),
                top 0.8s cubic-bezier(0.34, 1.56, 0.64, 1),
                width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1),
                height 0.8s cubic-bezier(0.34, 1.56, 0.64, 1),
                z-index 0.01s linear 0.8s,
                box-shadow 0.8s ease;
        }

        /* Wrapper that grows with content to keep borders stretched */
        .letter-inner-wrapper {
            position: relative;
            width: 100%;
            min-height: 100%;
            display: block;
            /* Using block instead of flex for more stable height-based growth */
            padding: 30px 40px;
        }

        /* Cardboard lines and borders - absolute within the growing wrapper */
        .letter-border {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            bottom: 15px;
            border: 3px double #5d4037;
            border-radius: 2px;
            pointer-events: none;
            z-index: 1;
        }

        .letter-dashed-line {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            bottom: 20px;
            border: 1px dashed rgba(93, 64, 55, 0.4);
            border-radius: 2px;
            pointer-events: none;
            z-index: 1;
        }

        /* Handwriting rows setup */
        .letter-writing-area {
            position: relative;
            width: 100%;
            margin-top: 15px;
            line-height: 40px;
            /* Background vintage dashed lines */
            background: repeating-linear-gradient(transparent, transparent 39px, rgba(93, 64, 55, 0.15) 39px, rgba(93, 64, 55, 0.15) 40px);
            font-size: 26px;
            color: var(--ink);
            word-wrap: break-word;
            /* Increased padding to ensure text stays well within frame */
            padding-bottom: 80px;
            display: inline-block;
            z-index: 2;
        }

        /* Handwritten elements styles */
        .letter-title {
            position: relative;
            z-index: 2;
            text-align: center;
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 800;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .letter-subtitle {
            position: relative;
            z-index: 2;
            text-align: center;
            font-family: 'Caveat', cursive;
            font-size: 22px;
            color: var(--crimson);
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        .typed-text {
            font-family: 'Great Vibes', cursive;
            font-size: 32px;
            line-height: 40px;
            white-space: pre-wrap;
            display: inline;
        }

        .keyword-label {
            color: #b71c1c;
            /* Deep Red for labels */
        }

        .keyword-value {
            color: #0d47a1;
            /* Deep Blue for content */
        }

        /* Active writing letter styling for character level tracking */
        #active-char {
            position: relative;
            display: inline-block;
            color: var(--ink);
        }

        /* Floating Pen / Quill */
        .quill-pen {
            position: absolute;
            width: 110px;
            height: 110px;
            pointer-events: none;
            z-index: 100;
            transform: translate(0, 0) rotate(15deg);
            opacity: 0;
            transition: opacity 0.5s ease;
            filter: drop-shadow(4px 10px 6px rgba(0, 0, 0, 0.3));
            /* Pivot point is set exactly at the metal nib tip (bottom-left area of SVG) */
            transform-origin: 12.5% 95.83%;
        }

        /* Retro Stamp on Letter */
        .letter-stamp {
            position: absolute;
            top: 25px;
            right: 25px;
            width: 55px;
            height: 55px;
            border: 2px solid rgba(128, 0, 32, 0.6);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Playfair Display', serif;
            font-weight: bold;
            font-size: 7px;
            color: rgba(128, 0, 32, 0.6);
            transform: rotate(-12deg);
            pointer-events: none;
            opacity: 0.85;
        }

        .letter-stamp::before {
            content: 'KỶ NIỆM TỐT NGHIỆP';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 1px dashed rgba(128, 0, 32, 0.6);
            transform: scale(0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* Wax Seal open classes */
        .is-open .wax-seal {
            transform: translate(-50%, -20%) scale(0) rotate(-45deg);
            pointer-events: none;
            opacity: 0;
        }

        .is-open .wax-seal-pulse {
            transform: translate(-50%, -20%) scale(0);
            pointer-events: none;
            opacity: 0;
        }

        /* Letter Slide Out when open.
           When opening: wait 0.3s for top flap to start opening, then slide out in 0.8s */
        .is-open .letter {
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%) scale(var(--letter-scale, 1));
            z-index: 9;
            transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s,
                left 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s,
                top 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s,
                width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s,
                height 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s,
                z-index 0.01s linear 0.3s,
                box-shadow 0.8s ease 0.3s;
        }

        /* State 1: Envelope opened, currently writing (typing). Fixed window and scrolling.
           ON DESKTOP: Render in LANDSCAPE mode for a beautiful formal wide certificate display. */
        .is-open .letter.typing {
            width: 750px;
            /* Landscape layout on computer */
            height: 500px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: rgba(93, 64, 55, 0.4) transparent;
        }

        /* State 2: Writing completed. Height expanded, scrollbar disabled, scaled to fit window.
           ON DESKTOP: Maintain LANDSCAPE horizontal sheet structure. */
        .is-open .letter.writing-completed {
            width: 750px;
            /* Landscape layout on computer */
            /* Height is specified inline by JS based on scrollHeight, then scaled down */
            overflow-y: visible;
        }

        .is-open .envelope-shadow {
            transform: scale(1.2) translateY(30px);
            opacity: 0.4;
        }

        /* Custom scrollbar for open letter cardboard (during typing) */
        .letter::-webkit-scrollbar {
            width: 5px;
        }

        .letter::-webkit-scrollbar-thumb {
            background-color: rgba(93, 64, 55, 0.4);
            border-radius: 3px;
        }

        /* RSVP Button */
        .rsvp-trigger {
            display: block;
            margin: 25px auto 5px auto;
            padding: 10px 24px;
            background-color: var(--crimson);
            color: white;
            font-family: 'Playfair Display', serif;
            font-weight: bold;
            font-size: 14px;
            border: 2px solid var(--gold);
            border-radius: 4px;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.3s ease;
        }

        .rsvp-trigger:hover {
            background-color: #9a0c32;
            transform: translateY(18px) scale(1.05);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.4);
        }

        .rsvp-trigger.show {
            opacity: 1;
            transform: translateY(0);
        }

        .rsvp-trigger.show:hover {
            transform: scale(1.05);
        }

        /* RSVP Form Slide Up overlay */
        .rsvp-overlay {
            position: absolute;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.8);
            z-index: 200;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .rsvp-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .rsvp-card {
            width: 380px;
            background: #ecd2af;
            border-radius: 6px;
            border: 3px double var(--accent);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            padding: 25px 30px;
            position: relative;
            transform: translateY(50px);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .rsvp-overlay.show .rsvp-card {
            transform: translateY(0);
        }

        .rsvp-title {
            text-align: center;
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            border-bottom: 1px dashed var(--accent);
            padding-bottom: 8px;
        }

        .rsvp-close {
            position: absolute;
            top: 15px;
            right: 15px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            color: var(--accent);
            background: none;
            border: none;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            font-family: 'Playfair Display', serif;
            font-size: 12px;
            font-weight: bold;
            color: var(--accent);
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid rgba(93, 64, 55, 0.5);
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.4);
            font-family: 'Playpen Sans', sans-serif;
            font-size: 13px;
            color: var(--ink);
            outline: none;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--crimson);
            background: rgba(255, 255, 255, 0.7);
        }

        .rsvp-submit {
            width: 100%;
            padding: 10px;
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 4px;
            font-family: 'Playfair Display', serif;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 10px;
            transition: background 0.3s ease;
        }

        .rsvp-submit:hover {
            background-color: var(--crimson);
        }

        /* RSVP Success message */
        .rsvp-success {
            text-align: center;
            display: none;
        }

        .rsvp-success h3 {
            font-family: 'Caveat', cursive;
            font-size: 36px;
            color: var(--crimson);
            margin-bottom: 10px;
        }

        .rsvp-success p {
            font-size: 14px;
            color: var(--accent);
            line-height: 1.5;
        }

        /* Customizer Trigger Button (Vintage Gear) */
        .customizer-toggle {
            position: absolute;
            bottom: 25px;
            right: 25px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--accent);
            border: 2px solid var(--gold);
            cursor: pointer;
            z-index: 10;
            display: none;
            /* Hidden by default for guests */
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
            transition: all 0.3s ease;
        }

        .customizer-toggle:hover {
            transform: rotate(90deg) scale(1.1);
        }

        .customizer-toggle svg {
            width: 26px;
            height: 26px;
            fill: var(--gold);
        }

        /* Customizer Sidebar Draw */
        .customizer-drawer {
            position: absolute;
            top: 0;
            right: -320px;
            width: 320px;
            height: 100%;
            background: #251610;
            border-left: 3px solid var(--gold);
            box-shadow: -5px 0 25px rgba(0, 0, 0, 0.6);
            z-index: 300;
            transition: right 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            padding: 30px;
            display: flex;
            flex-direction: column;
            color: #d7ccc8;
        }

        .customizer-drawer.open {
            right: 0;
        }

        .customizer-header {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            border-bottom: 2px solid var(--gold);
            padding-bottom: 10px;
            margin-bottom: 20px;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .customizer-close {
            background: none;
            border: none;
            color: var(--gold);
            font-size: 20px;
            cursor: pointer;
        }

        .customizer-body {
            flex-grow: 1;
            overflow-y: auto;
        }

        .customizer-body .form-group label {
            color: var(--gold);
        }

        .customizer-body .form-group input,
        .customizer-body .form-group textarea {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: #efebe9;
        }

        .customizer-body .form-group input:focus,
        .customizer-body .form-group textarea:focus {
            border-color: var(--gold);
            background: rgba(255, 255, 255, 0.15);
        }

        .customizer-save {
            width: 100%;
            padding: 12px;
            background-color: var(--gold);
            color: #2b1810;
            border: none;
            border-radius: 4px;
            font-family: 'Playfair Display', serif;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .customizer-save:hover {
            background-color: #fff;
            box-shadow: 0 0 10px var(--gold);
        }

        /* Close envelope button to fold it back down */
        .close-envelope-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 35px;
            height: 35px;
            background: rgba(93, 64, 55, 0.7);
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            cursor: pointer;
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .close-envelope-btn:hover {
            background: var(--crimson);
            transform: scale(1.1);
        }

        .is-open~.close-envelope-btn {
            display: flex;
        }

        /* Celebration canvas for flying caps and ribbons */
        #celebration-canvas {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 150;
        }

        /* Floating Info Indicator */
        .hint-text {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Caveat', cursive;
            color: rgba(255, 255, 255, 0.5);
            font-size: 22px;
            pointer-events: none;
            z-index: 3;
            animation: pulse-hint 2s infinite ease-in-out;
            transition: opacity 0.5s ease;
        }

        .is-open~.hint-text {
            opacity: 0;
        }

        @keyframes pulse-hint {
            0% {
                opacity: 0.3;
                transform: translate(-50%, 0);
            }

            50% {
                opacity: 0.8;
                transform: translate(-50%, -5px);
            }

            100% {
                opacity: 0.3;
                transform: translate(-50%, 0);
            }
        }

        /* HTML and UI adjustments for mobile.
           ON MOBILE: Keep the PORTRAIT vertical aspect ratio, but make the sheet 
           wider and the text larger/easier to read. */
        @media (max-width: 600px) {
            .envelope-container {
                width: 320px;
                height: 220px;
            }

            .envelope-label {
                margin-top: 60px;
                font-size: 15px;
            }

            .vintage-stamp {
                width: 45px;
                height: 60px;
            }

            .vintage-stamp svg {
                width: 20px;
                height: 20px;
            }

            .stamp-postmark {
                width: 60px;
                height: 60px;
                right: -5px;
            }

            .decor-cap {
                width: 150px;
                left: -20px;
                bottom: 2%;
            }

            .decor-scroll {
                width: 120px;
                right: -10px;
                bottom: 4%;
            }

            .decor-candle {
                display: none;
            }

            /* Responsive letter typing and completed styling overrides for mobile (Vertical/Portrait). */
            .is-open .letter.typing {
                width: 95vw;
                height: 70vh;
                max-height: 520px;
            }

            .letter-inner-wrapper {
                padding: 15px 35px;
            }

            .is-open .letter.writing-completed {
                width: 105vw;
                /* Narrower width for better focus on phone */
                text-align: left;
            }

            .letter-title {
                font-size: 20px;
                margin-bottom: 5px;
            }

            .letter-subtitle {
                font-size: 16px;
                margin-bottom: 12px;
            }

            .typed-text {
                font-size: 20px;
                /* Barely smaller to fit words better */
                line-height: 30px;
                display: block;
                width: 100%;
            }

            .letter-writing-area {
                line-height: 30px;
                background: repeating-linear-gradient(transparent, transparent 29px, rgba(93, 64, 55, 0.15) 29px, rgba(93, 64, 55, 0.15) 30px);
                padding-bottom: 60px;
                width: 100%;
            }

            .quill-pen {
                width: 70px;
                height: 70px;
            }

            .rsvp-card {
                width: 90%;
            }
        }
    </style>
</head>

<body>

    <!-- Celebration Canvas for Confetti -->
    <canvas id="celebration-canvas"></canvas>

    <!-- Retro Desk Scene -->
    <div class="desk-container">

        <div class="vignette"></div>

        <!-- Floating Petals Background Decorations -->
        <div class="petal p1"></div>
        <div class="petal p2"></div>
        <div class="petal p3"></div>
        <div class="petal p4"></div>
        <div class="petal p5"></div>

        <!-- Vintage Candle Decoration -->
        <div class="decor-candle">
            <div class="candle-flame"></div>
            <div class="candle-wick"></div>
            <div class="candle-body"></div>
            <div class="candle-stand"></div>
        </div>

        <!-- Graduation Cap Decoration -->
        <div class="decor decor-cap">
            <svg viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- Cap Main Shadow -->
                <path d="M256 128L464 200L256 272L48 200L256 128Z" fill="#150a06" opacity="0.4" />
                <!-- Cap Board -->
                <polygon points="256,120 480,192 256,264 32,192" fill="#252525" stroke="#111" stroke-width="6" />
                <!-- Cap Underside / Skullcap -->
                <path d="M128 210V280C128 320 185 352 256 352C327 352 384 320 384 280V210" fill="#1a1a1a" stroke="#111"
                    stroke-width="4" />
                <path d="M140 280C140 310 192 338 256 338C320 338 372 310 372 280" fill="#2a2a2a" />
                <!-- Tassel Band & Button -->
                <ellipse cx="256" cy="192" rx="12" ry="7" fill="#aa8612" stroke="#111" stroke-width="2" />
                <!-- Tassel String -->
                <path d="M256 195C280 205 340 250 360 270" stroke="#8a670c" stroke-width="4" stroke-linecap="round" />
                <!-- Tassel Fringe -->
                <polygon points="360,268 375,295 385,290 365,264" fill="#d4af37" stroke="#8a670c" stroke-width="1.5" />
            </svg>
        </div>

        <!-- Diploma Scroll Decoration -->
        <div class="decor decor-scroll">
            <svg viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- Rolled paper outline -->
                <path d="M120 140H380C410 140 410 200 380 200H120C90 200 90 140 120 140Z" fill="#e8d3b9"
                    stroke="#5d4037" stroke-width="5" />
                <!-- inner curl -->
                <ellipse cx="120" cy="170" rx="15" ry="30" fill="#d0b28f" stroke="#5d4037" stroke-width="4" />
                <ellipse cx="380" cy="170" rx="15" ry="30" fill="#f5e6d3" stroke="#5d4037" stroke-width="4" />
                <!-- Ribbon Ribbon Tie -->
                <rect x="235" y="137" width="40" height="66" fill="#a0122d" stroke="#5d4037" stroke-width="3" />
                <!-- Bow loops -->
                <path d="M235 170C210 160 210 190 235 170Z" fill="#c01535" stroke="#5d4037" stroke-width="2" />
                <path d="M275 170C300 160 300 190 275 170Z" fill="#c01535" stroke="#5d4037" stroke-width="2" />
                <path d="M250 185C240 210 230 220 232 230" stroke="#a0122d" stroke-width="3" stroke-linecap="round" />
                <path d="M260 185C270 210 280 220 278 230" stroke="#a0122d" stroke-width="3" stroke-linecap="round" />
            </svg>
        </div>

        <!-- Retro Music Player Button -->
        <div class="music-player-btn" id="music-btn" title="Phát nhạc cổ điển">
            <div class="vinyl-record">
                <div class="vinyl-center"></div>
            </div>
        </div>

        <!-- Customizer Toggle Panel Button -->
        <div class="customizer-toggle" id="customizer-btn" title="Cài đặt nội dung">
            <svg viewBox="0 0 24 24">
                <path
                    d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z" />
            </svg>
        </div>

        <!-- Close Envelope (Return to closed state) -->
        <button class="close-envelope-btn" id="close-envelope-btn" title="Đóng thiệp">✕</button>

        <!-- 3D Envelope Container -->
        <div class="envelope-container" id="envelope-wrapper">
            <div class="envelope-shadow"></div>

            <!-- Envelope Front Side -->
            <div class="envelope">
                <div class="texture-overlay"></div>
                <div class="envelope-dashed-border"></div>

                <!-- Flaps -->
                <div class="flap-top" id="envelope-flap-top">
                    <div class="texture-overlay"></div>
                </div>
                <div class="flap-left">
                    <div class="texture-overlay"></div>
                </div>
                <div class="flap-right">
                    <div class="texture-overlay"></div>
                </div>
                <div class="flap-bottom">
                    <div class="texture-overlay"></div>
                </div>

                <!-- Invitation Seal & Labels -->
                <div class="envelope-front-content">
                    <div class="vintage-stamp">
                        <!-- Graduation Cap Icon in Stamp -->
                        <svg viewBox="0 0 24 24">
                            <path
                                d="M12 3L1 9L12 15L21 10.09V17H23V9L12 3M12 5.18L18.82 8.9L12 12.62L5.18 8.9L12 5.18M19 11.54V13.89C17.65 14.58 15 15 12 15C9 15 6.35 14.58 5 13.89V11.54L12 15.36L19 11.54Z" />
                        </svg>
                        <span>Graduation</span>
                        <span>2026</span>
                        <div class="stamp-postmark"></div>
                    </div>

                    <h2 class="envelope-label">Thư Mời Nhập Tiệc</h2>
                    <p class="envelope-sublabel">Lễ Tốt Nghiệp Cử Nhân & Kỹ Sư</p>
                </div>

                <!-- Wax Seal Click Target -->
                <div class="wax-seal" id="seal-trigger" title="Nhấp để mở thư">
                    <!-- Wax Graduation Seal Details -->
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M12,2C11.4,2,10.9,2.4,10.8,3L9.3,9.4L3.6,11.3C3,11.5,2.7,12.1,2.9,12.7L4.8,18.4L9.1,17.2L12.3,21.6 C12.6,22.1,13.2,22.1,13.5,21.6L16.7,17.2L21,18.4L22.9,12.7C23.1,12.1,22.8,11.5,22.2,11.3L16.5,9.4L15,3C14.9,2.4,14.4,2,13.8,2H12z M12,6.5L13.8,9H10.2L12,6.5z M12,11c1.7,0,3,1.3,3,3s-1.3,3-3,3s-3-1.3-3-3S10.3,11,12,11z M12,12.5c-0.8,0-1.5,0.7-1.5,1.5 s0.7,1.5,1.5,1.5s1.5-0.7,1.5-1.5S12.8,12.5,12,12.5z" />
                    </svg>
                </div>
                <div class="wax-seal-pulse" id="seal-pulse"></div>

                <!-- Cardboard Letter Document -->
                <div class="letter" id="invitation-letter">
                    <div class="texture-overlay"></div>

                    <!-- New Wrapper to contain borders and content together for scrolling -->
                    <div class="letter-inner-wrapper">
                        <div class="letter-border"></div>
                        <div class="letter-dashed-line"></div>

                        <!-- Retro Inner Stamp Logo -->
                        <div class="letter-stamp">
                            GRADUATION
                        </div>

                        <!-- Invitation content area -->
                        <h1 class="letter-title">Thư Mời Tốt Nghiệp</h1>
                        <h3 class="letter-subtitle">🌸Class of 2026🌸</h3>

                        <div class="letter-writing-area">
                            <!-- Typewritten Text -->
                            <span class="typed-text" id="invitation-body"></span>

                            <!-- Floating Pen Graphic (Positioned relative to letter-writing-area) -->
                            <div class="quill-pen" id="quill-pen">
                                <!-- SVG Quill Pen/Nib -->
                                <svg viewBox="0 0 120 120" width="100%" height="100%" fill="none"
                                    xmlns="http://www.w3.org/2000/svg">
                                    <path
                                        d="M95 10C80 20 60 45 50 65C45 75 40 85 36 93L30 102L20 110L27 100L34 88C38 80 43 70 48 60C58 40 75 20 95 10Z"
                                        fill="#150a06" opacity="0.25" />
                                    <path d="M15 115L45 80C55 68 75 35 100 15" stroke="#efebe9" stroke-width="4"
                                        stroke-linecap="round" />
                                    <path d="M15 115L45 80C55 68 75 35 100 15" stroke="#d7ccc8" stroke-width="2"
                                        stroke-linecap="round" />
                                    <path
                                        d="M45 80C55 65 65 55 85 45M50 72C62 58 72 50 92 40M60 60C70 48 80 40 100 32M38 88C45 78 52 72 65 65"
                                        stroke="#eceff1" stroke-width="1.5" opacity="0.8" />
                                    <path d="M15 115L20 102L26 103L23 109L15 115Z" fill="#d4af37" stroke="#aa8612"
                                        stroke-width="1" />
                                    <line x1="15" y1="115" x2="21" y2="105" stroke="#4e342e" stroke-width="0.75" />
                                </svg>
                            </div>
                        </div>

                        <!-- RSVP Popup Trigger -->
                        <button class="rsvp-trigger" id="rsvp-btn">💌 Mình Chờ Phản Hồi Từ Bạn!</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Click to open prompt hint -->
        <div class="hint-text" id="hint-bubble">Nhấp vào dấu sáp để mở thư</div>

        <!-- RSVP Form Modal Overlay -->
        <div class="rsvp-overlay" id="rsvp-modal">
            <div class="rsvp-card">
                <button class="rsvp-close" id="rsvp-close-btn">✕</button>

                <div id="rsvp-form-container">
                    <h3 class="rsvp-title">Phản hồi từ bạn</h3>
                    <form id="rsvp-submit-form" onsubmit="submitRSVP(event)">
                        <div class="form-group">
                            <label for="rsvp-guest-name">Họ & Tên của Bạn</label>
                            <input type="text" id="rsvp-guest-name" required placeholder="Nhập tên của bạn...">
                        </div>
                        <div class="form-group">
                            <label for="rsvp-status">Xác Nhận Tham Dự</label>
                            <select id="rsvp-status" required>
                                <option value="" selected disabled>💌 Cho mình biết nhé!</option>
                                <option value="yes">🥳 Chắc chắn mình sẽ đến!</option>
                                <option value="no">😢 Tiếc quá, mình không thể đến</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="rsvp-message">Lời chúc gửi đến Kiều Trang</label>
                            <textarea id="rsvp-message" rows="3" placeholder="Nhập lời chúc tốt đẹp nhất..."></textarea>
                        </div>
                        <button type="submit" class="rsvp-submit">📩 Gửi phản hồi</button>
                    </form>
                </div>

                <!-- RSVP Success State -->
                <div class="rsvp-success" id="rsvp-success-card">
                    <h3>Cảm ơn bạn!</h3>
                    <p id="rsvp-thankyou-text">Lời phản hồi và chúc mừng của bạn đã được gửi thành công đến Kiều

    <!-- Background Music Synthesizer & Envelope Animation Controller -->
    <script>
        // Default Configuration for template

        // Load configuration from URL parameters if available
        function loadConfigFromURL() {

        // Initialize from URL on load
        loadConfigFromURL();

        // DOM elements
        const sealTrigger = document.getElementById('seal-trigger');
        const sealPulse = document.getElementById('seal-pulse');
        const envelopeWrapper = document.getElementById('envelope-wrapper');
        const closeEnvelopeBtn = document.getElementById('close-envelope-btn');
        const hintBubble = document.getElementById('hint-bubble');
        const invitationBody = document.getElementById('invitation-body');
        const rsvpBtn = document.getElementById('rsvp-btn');
        const rsvpModal = document.getElementById('rsvp-modal');
        const rsvpCloseBtn = document.getElementById('rsvp-close-btn');
        const musicBtn = document.getElementById('music-btn');

        // Customizer elements
        const customizerBtn = document.getElementById('customizer-btn');
        const customizerPanel = document.getElementById('customizer-panel');
        const customizerCloseBtn = document.getElementById('customizer-close-btn');

        // Typing config variables
        let isTyping = false;

        // Customizer drawer action

        // Toggle background music box synthesizer
        let audioCtx = null;
        let isPlaying = false;
        let melodyInterval = null;

        // Music Box Sound Synthesizer via Web Audio API
        function playMusicBoxNote(frequency, duration, delayTime) {
            if (!audioCtx) return;

            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            // Clean chime sound typical of wind-up music boxes (sine mixed with small triangle/frequency modulation)
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(frequency, audioCtx.currentTime + delayTime);

            // Gain envelope mimicking rapid impact and long decay of a steel comb chime
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime + delayTime);
            gainNode.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + delayTime + 0.02); // rapid attack
            gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + delayTime + duration); // decay

            // High frequency harmonics/chime resonance overlay
            const harmonicsOsc = audioCtx.createOscillator();
            const harmonicsGain = audioCtx.createGain();
            harmonicsOsc.type = 'sine';
            harmonicsOsc.frequency.setValueAtTime(frequency * 2, audioCtx.currentTime + delayTime);
            harmonicsGain.gain.setValueAtTime(0, audioCtx.currentTime + delayTime);
            harmonicsGain.gain.linearRampToValueAtTime(0.08, audioCtx.currentTime + delayTime + 0.01);
            harmonicsGain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + delayTime + duration * 0.7);

            // Simple acoustic/resonance reflection delay block
            const delay = audioCtx.createDelay();
            delay.delayTime.value = 0.15;
            const delayGain = audioCtx.createGain();
            delayGain.gain.value = 0.25;

            osc.connect(gainNode);
            harmonicsOsc.connect(harmonicsGain);

            gainNode.connect(audioCtx.destination);
            harmonicsGain.connect(audioCtx.destination);

            // Feedback echo
            gainNode.connect(delay);
            delay.connect(delayGain);
            delayGain.connect(audioCtx.destination);

            osc.start(audioCtx.currentTime + delayTime);
            harmonicsOsc.start(audioCtx.currentTime + delayTime);

            osc.stop(audioCtx.currentTime + delayTime + duration + 0.1);
            harmonicsOsc.stop(audioCtx.currentTime + delayTime + duration + 0.1);
        }

        // Graduation theme song: Energetic & Joyful (Victory / Celebration theme)
        // High energy, fast tempo, upbeat melody
        const musicBoxMelody = [
            // Main Upbeat Theme
            [523.25, 0.2, 0],   // C5
            [659.25, 0.2, 1],   // E5
            [783.99, 0.2, 2],   // G5
            [1046.50, 0.4, 3],  // C6 (Pop!)

            [783.99, 0.2, 5],   // G5
            [1046.50, 0.4, 6],  // C6

            [880.00, 0.2, 8],   // A5
            [880.00, 0.2, 9],   // A5
            [880.00, 0.2, 10],  // A5
            [1046.50, 0.4, 11], // C6
            [987.77, 0.2, 13],  // B5
            [783.99, 0.2, 14],  // G5
            [659.25, 0.4, 15],  // E5

            // Second Phrase - Rising
            [523.25, 0.2, 17],  // C5
            [587.33, 0.2, 18],  // D5
            [659.25, 0.2, 19],  // E5
            [698.46, 0.2, 20],  // F5
            [783.99, 0.4, 21],  // G5

            [987.77, 0.4, 25],  // B5
            [1046.50, 0.6, 27], // C6 (Peak)

            // Fanfare Ending
            [523.25, 0.2, 30],  // C5
            [783.99, 0.2, 31],  // G5

        ];

        function playMusicSequence() {
            if (!isPlaying) return;
            const tempoFactor = 0.25; // Much faster tempo for energy

            musicBoxMelody.forEach(note => {
                playMusicBoxNote(note[0], note[1], note[2] * tempoFactor);
            });

            // Loop quickly to keep the energy up
            melodyInterval = setTimeout(playMusicSequence, 10000);

        musicBtn.addEventListener('click', () => {

            } else {

        // Apply new customization configurations

        // Action when Wax Seal clicked: Opens Envelope and starts writing
        sealTrigger.addEventListener('click', openEnvelope);

        function openEnvelope() {
            // Trigger background music automatically if not playing
            if (!isPlaying) {
                musicBtn.click();

            envelopeWrapper.classList.add('is-open');

        function resetEnvelope() {
            envelopeWrapper.classList.remove('is-open');

            // Clean states
            isTyping = false;
            clearTimeout(typingTimer);
            cancelAnimationFrame(penPositionTimer);
            invitationBody.innerHTML = '';
            rsvpBtn.classList.remove('show');

            // Reset letter states and heights
            letterContainer.classList.remove('typing', 'writing-completed');
            letterContainer.style.height = '';
            envelopeWrapper.style.setProperty('--letter-scale', 1);
        }

        // HTML Character Escaper
        function escapeHtml(string) {
            return string
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // Render typed text, wrapping the absolute last character in #active-char for pen tracking
        function renderTypedText(text, index) {
            if (index <= 0) return '';

            const written = text.substring(0, index - 1);
            const lastChar = text[index - 1];

            let escapedWritten = escapeHtml(written).replace(/\n/g, '<br>');
            let escapedLast = escapeHtml(lastChar);
            if (lastChar === '\n') escapedLast = '<br>';

            // Dynamic Keyword Coloring
            const labels = ['Thân gửi:', 'Tân Khoa:', 'Chuyên ngành:', 'Thời gian:', 'Địa điểm:', 'Trân trọng đón tiếp!'];
            labels.forEach(lbl => {
                const escapedLbl = escapeHtml(lbl);
                escapedWritten = escapedWritten.split(escapedLbl).join(`<span class="keyword-label">${escapedLbl}</span>`);
            });

            // Color the dynamic values (blue)
            const values = [config.guest, config.gradName, config.degree, config.date, config.venue];
            values.forEach(val => {
                if (!val) return;
                const escapedVal = escapeHtml(val);
                // We only color if the value is fully or partially present, but it's cleaner to wait for full words 
                // However, to make it look "written in blue ink" as it's typed:
                escapedWritten = escapedWritten.split(escapedVal).join(`<span class="keyword-value">${escapedVal}</span>`);
            });

            if (lastChar === '\n') {
                return escapedWritten + '<br><span id="active-char" style="display:inline-block; width:0; height:0; overflow:visible;">&nbsp;</span>';
            } else {
                return escapedWritten + `<span id="active-char">${escapedLast}</span>`;
            }
        }

        // Main handwriting typing generator
        function startHandwriting() {
            isTyping = true;
            pen.style.opacity = '1';

            // Compose invitation string dynamically
            const fullText = `Thân gửi: ${config.guest}\n\n🎓Một hành trình khép lại, một chặng đường mới chính thức bắt đầu!\n\nMình rất vui và trân trọng kính mời bạn đến tham dự Lễ Tốt Nghiệp và cùng mình lưu giữ những khoảnh khắc đáng nhớ trong ngày đặc biệt này của:\n\n⭐ Tân cử nhân: ${config.gradName}\n🎓 Chuyên ngành: ${config.degree}\nCùng mình đánh dấu cột mốc đặc biệt vào:\n⏱ Thời gian: ${config.date}\n📍 Địa điểm: ${config.venue}\n\nSự hiện diện của bạn sẽ là niềm vui lớn nhất, còn những lời chúc tốt đẹp sẽ là hành trang quý giá để mình tự tin bước tiếp trên chặng đường mới💫.\n\nSee you at my Graduation`;

            let charIndex = 0;

            // Start pen tracking animation frame loop
            trackPenPosition();

            function typeNextChar() {
                if (!isTyping) return;

                if (charIndex <= fullText.length) {
                    invitationBody.innerHTML = renderTypedText(fullText, charIndex);

                    // Auto scroll letter viewport to keep the active character/pen in view
                    scrollFollowCursor();

                    charIndex++;

                    // Humanlike writing speed variance (typing delays)
                    let delay = 35 + Math.random() * 50;
                    const prevChar = fullText[charIndex - 2];
                    if (prevChar === '.' || prevChar === '!' || prevChar === ':') delay = 400; // brief pause at sentence breaks
                    if (prevChar === '\n') delay = 250; // pause on new lines

                    typingTimer = setTimeout(typeNextChar, delay);
                } else {
                    // Handwriting finished
                    isTyping = false;
                    cancelAnimationFrame(penPositionTimer);

                    setTimeout(() => {
                        pen.style.opacity = '0';

                        invitationBody.innerHTML += `
                            <div style="text-align:center;">
                                <img src="anh.png" style="width:550px; border-radius:10px; display:inline-block;">
                            </div>
                        `;

                        // Show RSVP button BEFORE fitting to screen
                        rsvpBtn.classList.add('show');

                        // Switch letter state to writing-completed
                        letterContainer.classList.remove('typing');
                        letterContainer.classList.add('writing-completed');

                        // Measure content height from the inner wrapper - ensures borders fit!
                        const innerWrapper = letterContainer.querySelector('.letter-inner-wrapper');
                        letterContainer.style.height = 'auto';
                        const contentHeight = innerWrapper.scrollHeight;
                        letterContainer.style.height = `${contentHeight}px`;

                        // Scale cardboard letter to fit screen perfectly
                        fitLetterToScreen();
                    }, 500);
                }
            }

            typeNextChar();
        }

        // Auto-scroll when cursor falls below visible area
        function scrollFollowCursor() {
            const activeChar = document.getElementById('active-char');
            if (activeChar) {
                const y = activeChar.offsetTop;
                const containerHeight = letterContainer.clientHeight;
                const currentScroll = letterContainer.scrollTop;

                // Centering the active line in the viewport
                const targetScroll = y - (containerHeight * 0.5);

                if (targetScroll > currentScroll) {
                    letterContainer.scrollTop = targetScroll;
                }
            }
        }

        // Track writing cursor and smoothly reposition SVG pen tip (nib tip)
        function trackPenPosition() {
            if (!isTyping) return;

            const activeChar = document.getElementById('active-char');
            if (activeChar && pen) {
                // Get marker coordinates relative to the text area container
                const x = activeChar.offsetLeft;
                const y = activeChar.offsetTop;
                const charWidth = activeChar.offsetWidth;
                const charHeight = activeChar.offsetHeight;

                // Pen tip should align at the right edge and mid-height of the active character
                const targetX = x + charWidth;
                const targetY = y + charHeight * 0.7;

                const width = pen.offsetWidth || 110;
                const height = pen.offsetHeight || 110;

                // Nib tip coordinates relative to pen container size (15/120, 115/120)
                const originX = width * 0.125;
                const originY = height * 0.9583;

                // Position pen top-left so that its origin tip lands on targetX, targetY
                const penLeft = targetX - originX;
                const penTop = targetY - originY;

                // Add small organic wiggle to mimic actual hand writing motion
                const wiggleX = Math.sin(Date.now() / 80) * 1.2;
                const wiggleY = Math.cos(Date.now() / 80) * 1.5;
                const rotateWiggle = Math.sin(Date.now() / 50) * 6;

                // Translate & rotate pen
                pen.style.left = `${penLeft + wiggleX}px`;
                pen.style.top = `${penTop + wiggleY}px`;
                pen.style.transform = `rotate(${15 + rotateWiggle}deg)`;
            }

            penPositionTimer = requestAnimationFrame(trackPenPosition);
        }

        // Fit completed cardboard invitation sheet into screen
        function fitLetterToScreen() {
            if (isTyping) return;

            // Temporarily reset scale to 1 to calculate true offsets
            envelopeWrapper.style.setProperty('--letter-scale', 1);

            requestAnimationFrame(() => {
                const letterHeight = letterContainer.scrollHeight;
                const letterWidth = letterContainer.offsetWidth;
                const windowHeight = window.innerHeight;
                const windowWidth = window.innerWidth;

                // Use a larger visible window area
                const maxVisualHeight = windowHeight * 0.88;
                const maxVisualWidth = windowWidth * 0.94;

                const scaleHeight = maxVisualHeight / letterHeight;
                const scaleWidth = maxVisualWidth / letterWidth;

                let fitScale = Math.min(scaleHeight, scaleWidth);

                // Constraints
                const maxCap = windowWidth < 600 ? 0.95 : 1.25;
                const minCap = 0.35;
                fitScale = Math.max(minCap, Math.min(maxCap, fitScale));

                envelopeWrapper.style.setProperty('--letter-scale', fitScale);
            });
        }

        // Window resize handler to refit letter if open and completed
        window.addEventListener('resize', () => {
            if (envelopeWrapper.classList.contains('is-open') && !isTyping && invitationBody.innerHTML !== '') {
                fitLetterToScreen();

        rsvpCloseBtn.addEventListener('click', closeRSVPModal);

        }

        // RSVP Form submit triggers celebration confetti
        async function submitRSVP(e) {
            e.preventDefault();
            const submitBtn = e.target.querySelector('.rsvp-submit');
            const guestName = document.getElementById('rsvp-guest-name').value;
            const rsvpStatus = document.getElementById('rsvp-status').value;
            const rsvpMessage = document.getElementById('rsvp-message').value;

            // Disable button and show loading state
            const originalBtnText = submitBtn.innerText;
            submitBtn.innerText = 'Đang gửi...';
            submitBtn.disabled = true;

            try {
                // Send data to Formspree
                const response = await fetch('https://formspree.io/f/xaqzgnzr', {
                    method: 'POST',
                    body: JSON.stringify({
                        name: guestName,
                        status: rsvpStatus === 'yes' ? 'Tham gia' : 'Không tham gia',
                        message: rsvpMessage
                    }),
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    }
                });

                if (response.ok) {
                    document.getElementById('rsvp-form-container').style.display = 'none';
                    const thankyou = document.getElementById('rsvp-thankyou-text');

                    if (rsvpStatus === 'yes') {
                        thankyou.innerText = `Cảm ơn bạn ${guestName} đã xác nhận tham dự! Hãy chuẩn bị những bộ cánh thật đẹp để chụp hình cùng Tân Cử Nhân nhé! 🎉`;
                        triggerCelebration();
                    } else {
                        thankyou.innerText = `Cảm ơn bạn ${guestName} đã phản hồi. Tiếc quá vì bạn không thể trực tiếp chung vui cùng Tân Cử Nhân, nhưng những lời chúc tốt đẹp của bạn đã được ghi nhận và trân trọng!`;
                    }

                    document.getElementById('rsvp-success-card').style.display = 'block';
                    document.getElementById('rsvp-submit-form').reset();
                } else {
                    alert('Có lỗi xảy ra khi gửi. Vui lòng thử lại sau.');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Không thể kết nối đến máy chủ. Vui lòng kiểm tra mạng.');
            } finally {
                submitBtn.innerText = originalBtnText;
                submitBtn.disabled = false;

        // Confetti Celebration Canvas Animation
        const canvas = document.getElementById('celebration-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let celebrationTimer = null;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor(x, y, type) {
                this.x = x;
                this.y = y;
                this.type = type; // 'cap' or 'ribbon'
                this.size = type === 'cap' ? 24 + Math.random() * 12 : 8 + Math.random() * 8;
                this.color = type === 'cap' ? '#1a1a1a' : `hsl(${Math.random() * 360}, 80%, 60%)`;
                this.tasselColor = '#d4af37';

                this.speedX = -5 + Math.random() * 10;
                this.speedY = -12 - Math.random() * 12; // shoot upwards
                this.gravity = 0.35 + Math.random() * 0.15;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = -0.05 + Math.random() * 0.1;
                this.opacity = 1;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.speedY += this.gravity;
                this.rotation += this.rotationSpeed;

                if (this.y > canvas.height - 20) {
                    this.opacity -= 0.015;
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.globalAlpha = Math.max(0, this.opacity);

                if (this.type === 'cap') {
                    // Draw mini Graduation Cap
                    ctx.fillStyle = this.color;
                    ctx.strokeStyle = '#000';
                    ctx.lineWidth = 1;

                    // Cap Rhombus (top plate)
                    ctx.beginPath();
                    ctx.moveTo(0, -this.size / 3);
                    ctx.lineTo(this.size, 0);
                    ctx.lineTo(0, this.size / 3);
                    ctx.lineTo(-this.size, 0);
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();

                    // Cap Underbody
                    ctx.fillStyle = '#111';
                    ctx.beginPath();
                    ctx.arc(0, 2, this.size / 2, 0, Math.PI);
                    ctx.fill();
                    ctx.stroke();

                    // Tassel Button
                    ctx.fillStyle = this.tasselColor;
                    ctx.beginPath();
                    ctx.arc(0, -this.size / 8, 3, 0, Math.PI * 2);
                    ctx.fill();

                    // Tassel Line
                    ctx.strokeStyle = this.tasselColor;
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.moveTo(0, -this.size / 8);
                    ctx.lineTo(this.size * 0.6, this.size * 0.3);
                    ctx.stroke();
                } else {
                    // Draw Ribbon/Confetti
                    ctx.fillStyle = this.color;
                    ctx.fillRect(-this.size / 2, -this.size / 4, this.size, this.size / 2);
                }

                ctx.restore();
            }
        }

        function triggerCelebration() {
            particles = [];

            // Spawn particles from bottom corners shooting inwards/upwards
            // Left corner
            for (let i = 0; i < 45; i++) {
                setTimeout(() => {
                    const p = new Particle(50, canvas.height - 50, Math.random() > 0.45 ? 'cap' : 'ribbon');
                    p.speedX = 4 + Math.random() * 12; // shoot right
                    particles.push(p);
                }, i * 30);
            }

            // Right corner
            for (let i = 0; i < 45; i++) {
                setTimeout(() => {
                    const p = new Particle(canvas.width - 50, canvas.height - 50, Math.random() > 0.45 ? 'cap' : 'ribbon');
                    p.speedX = -4 - Math.random() * 12; // shoot left
                    particles.push(p);
                }, i * 30);
            }

            // Start loop
            if (celebrationTimer) cancelAnimationFrame(celebrationTimer);
            animateCelebration();
        }

        function animateCelebration() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            particles.forEach((p, idx) => {
                p.update();
                p.draw();
                if (p.opacity <= 0) {
                    particles.splice(idx, 1);
                }
            });

            if (particles.length > 0) {
                celebrationTimer = requestAnimationFrame(animateCelebration);
            } else {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
        }
    </script>
</body>

</html>
